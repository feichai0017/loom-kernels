name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  python:
    name: engine adapter contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Test adapter contract
        run: PYTHONPATH=python python -m unittest discover -s python/tests -v

      - name: Compile adapter package
        run: python -m compileall -q python/attnarc_engine

      - name: Build adapter wheel
        run: python -m pip wheel --no-deps --wheel-dir /tmp/attnarc-wheel ./python

  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Release check
        run: cargo check --workspace --release
