name: ci

on:
  push:
    branches: ["main"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      - name: Release check
        run: cargo check --workspace --release

      - name: Validate publishable crate archives
        run: |
          cargo package -p loom-kernels
          cargo package -p loom-cuda-sys
          cargo package -p loom-cuda --list > /tmp/loom-cuda-package-files
          cargo package -p loom-cuda-bridge --list > /tmp/loom-cuda-bridge-package-files
          grep -Fx 'README.md' /tmp/loom-cuda-package-files
          grep -Fx 'examples/rust_cuda_smoke.rs' /tmp/loom-cuda-package-files
          grep -Fx 'README.md' /tmp/loom-cuda-bridge-package-files
          grep -Fx 'include/loom_cuda_bridge.h' /tmp/loom-cuda-bridge-package-files
          tar -tf target/package/loom-cuda-sys-*.crate > /tmp/loom-cuda-sys-package-files
          grep -Eq '/cuda/src/paged_decode_attention\.cu$' \
            /tmp/loom-cuda-sys-package-files

  benchmark-tools:
    name: python package · benchmark syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Compile baseline tools
        run: python -m compileall -q benchmarks python

      - name: Build Python adapter wheel
        run: python -m pip wheel --no-deps --wheel-dir /tmp/loom-kernels-wheel ./python

      - name: Install and inspect Python adapter wheel
        run: |
          python -m pip install --force-reinstall /tmp/loom-kernels-wheel/*.whl
          python -m pip check
          python - <<'PY'
          from importlib.metadata import entry_points, version

          import loom_kernels

          assert version("loom-kernels") == loom_kernels.__version__
          plugins = entry_points(group="vllm.general_plugins")
          assert any(plugin.name == "loom_kernels" for plugin in plugins)
          print(f"loom-kernels {loom_kernels.__version__}")
          PY

  website:
    name: astro website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check and build
        run: npm run build
